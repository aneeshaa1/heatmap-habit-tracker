<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Heatmap</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Habits" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 24px; color: #1f2328; background: #fff;
    }
    [hidden] { display: none !important; }
    .page-head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .page-head h1 { font-size: 18px; margin: 0; }
    .btn {
      font-size: 13px; padding: 6px 12px; border-radius: 6px;
      border: 1px solid #d0d7de; background: #f6f8fa; cursor: pointer;
    }
    .btn.primary { background: #2da44e; color: #fff; border-color: #2da44e; }
    .btn.confirm { background: #cf222e; color: #fff; border-color: #cf222e; }
    .btn.icon { padding: 6px 9px; }
    #status { font-size: 12px; color: #57606a; margin-bottom: 16px; }
    #status.err { color: #cf222e; }

    /* ---- Login ---- */
    .auth {
      max-width: 300px; border: 1px solid #d0d7de; border-radius: 10px;
      padding: 18px; box-sizing: border-box;
    }
    .auth h2 { font-size: 15px; margin: 0 0 12px; }
    .auth input {
      display: block; width: 100%; box-sizing: border-box; margin-bottom: 8px;
      padding: 6px 10px; border: 1px solid #d0d7de; border-radius: 6px; font-size: 13px;
    }
    .auth input:focus { border-color: #0969da; outline: none; }
    .auth .actions { display: flex; gap: 8px; margin-top: 4px; }
    #auth-msg { font-size: 12px; color: #cf222e; margin-top: 8px; min-height: 14px; }

    /* ---- Habit card ---- */
    .card {
      border: 1px solid #d0d7de; border-radius: 10px; padding: 16px 18px;
      margin-bottom: 18px; width: fit-content; max-width: 100%; box-sizing: border-box;
    }
    .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .card-head input.name {
      font-size: 15px; font-weight: 600; border: 1px solid transparent;
      border-radius: 6px; padding: 3px 6px; width: 60%;
    }
    .card-head input.name:hover { border-color: #d0d7de; }
    .card-head input.name:focus { border-color: #0969da; outline: none; }
    .card-actions { display: flex; gap: 6px; }

    .cal { display: inline-block; max-width: 100%; overflow-x: auto; }
    .months { display: grid; gap: 3px; margin-left: 30px; margin-bottom: 4px; font-size: 11px; color: #57606a; }
    .month { grid-row: 1; white-space: nowrap; }
    .body { display: flex; gap: 3px; }
    .days { display: grid; grid-template-rows: repeat(7, 12px); gap: 3px; font-size: 11px; color: #57606a; width: 27px; }
    .day-label { line-height: 12px; }
    .grid { display: grid; grid-template-rows: repeat(7, 12px); grid-auto-flow: column; grid-auto-columns: 12px; gap: 3px; }
    .cell { width: 12px; height: 12px; border-radius: 2px; background: #ebedf0; }
    .grid .cell[data-date] { cursor: pointer; }
    .grid .cell[data-date]:hover { outline: 1px solid rgba(0,0,0,0.35); }
    .legend { display: flex; align-items: center; gap: 4px; justify-content: flex-end; margin-top: 8px; font-size: 11px; color: #57606a; }
    .legend .swatch { width: 12px; height: 12px; border-radius: 2px; }
    .hint { font-size: 11px; color: #57606a; margin-top: 6px; }

    /* ---- Per-card settings ---- */
    .settings {
      margin-top: 14px; padding: 14px; border-radius: 8px; background: #f6f8fa;
      font-size: 13px; display: flex; flex-direction: column; gap: 14px;
    }
    .setting { display: flex; align-items: flex-start; gap: 16px; }
    .setting-label {
      font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
      color: #57606a; width: 64px; flex-shrink: 0; line-height: 28px;
    }
    .setting-control { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }

    .segmented { display: inline-flex; background: #eaeef2; border-radius: 8px; padding: 2px; }
    .segmented label { cursor: pointer; }
    .segmented input { position: absolute; opacity: 0; pointer-events: none; }
    .segmented span {
      display: inline-block; padding: 4px 12px; border-radius: 6px;
      font-size: 12px; color: #57606a; transition: all .15s ease; user-select: none;
    }
    .segmented input:checked + span {
      background: #fff; color: #1f2328; font-weight: 500;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }

    .stepper {
      display: inline-flex; align-items: center; background: #fff;
      border: 1px solid #d0d7de; border-radius: 8px; overflow: hidden;
    }
    .stepper .step-btn {
      width: 26px; height: 26px; border: none; background: none; cursor: pointer;
      font-size: 14px; color: #57606a; line-height: 1;
    }
    .stepper .step-btn:hover { background: #f6f8fa; color: #1f2328; }
    .stepper input.level-count {
      width: 32px; border: none; outline: none; text-align: center;
      font-size: 13px; padding: 0; background: transparent;
      -moz-appearance: textfield; appearance: textfield;
    }
    .stepper input.level-count::-webkit-inner-spin-button { -webkit-appearance: none; }

    .swatches { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
    .swatch-field { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; color: #57606a; }
    .swatch-field input[type=color] {
      width: 26px; height: 26px; border: none; border-radius: 6px;
      background: none; cursor: pointer; padding: 0; -webkit-appearance: none; appearance: none;
    }
    .swatch-field input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
    .swatch-field input[type=color]::-webkit-color-swatch { border: none; border-radius: 6px; }
    .swatch-field input[type=color]::-moz-color-swatch { border: none; border-radius: 6px; }
    .min-wrap {
      display: inline-flex; align-items: center; gap: 1px;
      background: #fff; border: 1px solid #d0d7de; border-radius: 999px; padding: 1px 6px;
    }
    .min-wrap input.min-val {
      width: 26px; border: none; outline: none; background: transparent;
      font-size: 11px; text-align: center; padding: 0;
      -moz-appearance: textfield; appearance: textfield;
    }
    .min-wrap input.min-val::-webkit-inner-spin-button { -webkit-appearance: none; }

    .gradient-fill-btn {
      border: none; background: none; cursor: pointer; padding: 4px 0;
      font-size: 12px; color: #0969da;
    }
    .gradient-fill-btn:hover { text-decoration: underline; }

    .scheme-select, .scheme-name {
      padding: 4px 8px; border: 1px solid #d0d7de; border-radius: 8px;
      font-size: 12px; background: #fff; color: #1f2328;
    }
    .scheme-name { width: 100px; }
    .scheme-name:focus { border-color: #0969da; outline: none; }
    .setting-control .btn { font-size: 12px; padding: 4px 10px; }

    .settings-btn.open { background: #eaeef2; }
    label { cursor: pointer; }

    /* ---- Click-to-log popover ---- */
    .popover { position: absolute; z-index: 20; background: #fff; border: 1px solid #d0d7de; border-radius: 8px; padding: 10px; box-shadow: 0 4px 14px rgba(0,0,0,.12); font-size: 13px; }
    .popover .date { font-size: 11px; color: #57606a; margin-bottom: 6px; }
    .popover input { width: 72px; padding: 4px 6px; border: 1px solid #d0d7de; border-radius: 6px; font-size: 13px; }
    .popover .actions { display: flex; gap: 6px; margin-top: 8px; }
    .popover button { font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 1px solid #d0d7de; background: #f6f8fa; cursor: pointer; }
    .popover button.primary { background: #2da44e; color: #fff; border-color: #2da44e; }
  </style>
</head>
<body>
  <div class="page-head">
    <h1>Habit Heatmap</h1>
    <button class="btn primary" id="add-habit">+ Add habit</button>
    <button class="btn" id="logout" hidden>Log out</button>
  </div>
  <div id="status">Loading…</div>
  <div id="auth" class="auth" hidden>
    <h2>Log in</h2>
    <input type="email" id="auth-email" placeholder="Email" autocomplete="email" />
    <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" />
    <div class="actions">
      <button class="btn primary" id="login-btn">Log in</button>
      <button class="btn" id="signup-btn">Sign up</button>
    </div>
    <div id="auth-msg"></div>
  </div>
  <div id="habits"></div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://gcvdgragnbkcoxitomij.supabase.co";
    const SUPABASE_KEY = "sb_publishable_dbRHBbWuyeRyT_TmO4YPpQ_vONUyaGC";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const YEAR = 2026;
    const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const DEMO = false;  // only seeds the very first auto-created habit

    // ?habit=Name (or ?habit=Name1,Name2) shows only those habits —
    // lets each Notion embed hold a single short widget instead of one tall one.
    const WANTED = (new URLSearchParams(location.search).get("habit") || "")
      .split(",").map((s) => s.trim().toLowerCase()).filter(Boolean);
    const PALETTE = ["#9be9a8", "#40c463", "#30a14e", "#216e39", "#0e4429", "#0550ae", "#8250df", "#bf3989", "#cf222e", "#fb8500"];
    const MAX_LEVELS = 100;

    const statusEl = document.getElementById("status");
    const habitsEl = document.getElementById("habits");

    // ---- Pure helpers ----
    function defaultColors(mode, count = 4) {
      if (mode === "binary") return { empty: "#ebedf0", scale: [{ min: 1, color: "#40c463" }] };
      const n = Math.max(1, Math.min(MAX_LEVELS, count));
      const scale = [];
      for (let i = 0; i < n; i++) scale.push({ min: i + 1, color: PALETTE[i % PALETTE.length] });
      return { empty: "#ebedf0", scale };
    }
    function normalizeScale(scale) {
      return [...scale]
        .map((s) => ({ min: Math.max(1, Number(s.min) || 1), color: s.color }))
        .sort((a, b) => a.min - b.min);
    }
    function resizeScale(scale, count) {
      const sorted = normalizeScale(scale);
      const n = Math.max(1, Math.min(MAX_LEVELS, count));
      const result = [];
      for (let i = 0; i < n; i++) {
        if (sorted[i]) result.push({ ...sorted[i] });
        else {
          const prevMin = result[i - 1]?.min ?? 0;
          result.push({ min: prevMin + 1, color: PALETTE[i % PALETTE.length] });
        }
      }
      return result;
    }
    function resolveColors(habit) {
      const c = habit.colors;
      if (c && !Array.isArray(c) && Array.isArray(c.scale) && c.scale.length) {
        const out = { empty: c.empty || "#ebedf0", scale: normalizeScale(c.scale) };
        if (Array.isArray(c.gradedScale) && c.gradedScale.length) {
          out.gradedScale = normalizeScale(c.gradedScale);
        }
        if (Array.isArray(c.presets) && c.presets.length) out.presets = c.presets;
        return out;
      }
      return defaultColors(habit.mode || "graded");
    }
    function parseHex(hex) {
      const h = String(hex).replace("#", "");
      return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
    }
    function toHex([r, g, b]) {
      return "#" + [r, g, b].map((c) => Math.round(c).toString(16).padStart(2, "0")).join("");
    }
    function lerpColor(c1, c2, t) {
      const a = parseHex(c1), b = parseHex(c2);
      return toHex(a.map((v, i) => v + (b[i] - v) * t));
    }
    function fillGradientScale(scale) {
      const sorted = normalizeScale(scale);
      if (sorted.length < 2) return sorted;
      const first = sorted[0].color, last = sorted[sorted.length - 1].color;
      const stops = sorted.length === 2 ? resizeScale(sorted, 4) : sorted;
      const n = stops.length;
      return stops.map((stop, i) => ({
        ...stop,
        color: lerpColor(first, last, n === 1 ? 0 : i / (n - 1)),
      }));
    }
    function colorFor(value, colors) {
      if (!value) return colors.empty;
      let chosen = colors.empty;
      for (const stop of colors.scale) if (value >= stop.min) chosen = stop.color;
      return chosen;
    }
    function isoDate(d) {
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${d.getFullYear()}-${m}-${day}`;
    }
    function startOfDay(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function isFutureEmpty(date, value) {
      if (value) return false;
      const today = startOfDay(new Date());
      const day = startOfDay(date);
      if (YEAR < today.getFullYear()) return false;
      if (YEAR > today.getFullYear()) return true;
      return day > today;
    }
    function buildWeeks(year) {
      const first = new Date(year, 0, 1), last = new Date(year, 11, 31);
      const start = new Date(first); start.setDate(start.getDate() - start.getDay());
      const weeks = []; const cur = new Date(start);
      while (cur <= last) {
        const week = [];
        for (let d = 0; d < 7; d++) {
          const date = new Date(cur);
          week.push({ date, inYear: date >= first && date <= last });
          cur.setDate(cur.getDate() + 1);
        }
        weeks.push(week);
      }
      return weeks;
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }
    const WEEKS = buildWeeks(YEAR);

    // ---- Shared popover ----
    let popover = null;
    function closePopover() { if (popover) { popover.remove(); popover = null; } }
    function openEditor(cell, key, currentValue, onSave) {
      closePopover();
      const rect = cell.getBoundingClientRect();
      popover = document.createElement("div");
      popover.className = "popover";
      popover.style.left = (rect.left + window.scrollX) + "px";
      popover.style.top = (rect.bottom + window.scrollY + 6) + "px";
      popover.innerHTML = `
        <div class="date">${key}</div>
        <input type="number" step="any" min="0" />
        <div class="actions">
          <button class="primary" data-act="save">Save</button>
          <button data-act="clear">Clear</button>
        </div>`;
      document.body.appendChild(popover);
      const input = popover.querySelector("input");
      input.value = currentValue ?? ""; input.focus(); input.select();
      const save = async () => { await onSave(Number(input.value) || 0); closePopover(); };
      popover.querySelector("[data-act=save]").onclick = save;
      popover.querySelector("[data-act=clear]").onclick = async () => { await onSave(0); closePopover(); };
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") save();
        if (e.key === "Escape") closePopover();
      });
    }
    document.addEventListener("mousedown", (e) => {
      if (popover && !popover.contains(e.target) && !e.target.dataset.date) closePopover();
    });

    // ---- Render one habit as a self-contained card ----
    function renderHabitCard(habit, entryRows) {
      const entriesByDate = {};
      for (const e of entryRows) entriesByDate[e.date] = Number(e.value);

      // Per-card working state (mode + colors), synced to the DB on change.
      const state = { mode: habit.mode || "graded", colors: resolveColors(habit) };

      const card = document.createElement("div");
      card.className = "card";
      card.dataset.habitId = habit.id;
      card.innerHTML = `
        <div class="card-head">
          <input class="name" value="${escapeHtml(habit.name)}" />
          <div class="card-actions">
            <button class="btn icon move-up" title="Move up">↑</button>
            <button class="btn icon move-down" title="Move down">↓</button>
            <button class="btn settings-btn">⚙ Settings</button>
            <button class="btn delete-btn">Delete</button>
          </div>
        </div>
        <div class="cal">
          <div class="months"></div>
          <div class="body"><div class="days"></div><div class="grid"></div></div>
          <div class="legend"></div>
          <div class="hint"></div>
        </div>
        <div class="settings" hidden>
          <div class="setting">
            <span class="setting-label">Tracking</span>
            <div class="setting-control">
              <div class="segmented">
                <label><input type="radio" class="mode" name="mode-${habit.id}" value="graded" /><span>Graded</span></label>
                <label><input type="radio" class="mode" name="mode-${habit.id}" value="binary" /><span>Yes / No</span></label>
              </div>
            </div>
          </div>
          <div class="setting graded-only">
            <span class="setting-label">Levels</span>
            <div class="setting-control">
              <div class="stepper">
                <button type="button" class="step-btn" data-step="-1" aria-label="Fewer levels">−</button>
                <input type="number" class="level-count" min="1" max="${MAX_LEVELS}" step="1" />
                <button type="button" class="step-btn" data-step="1" aria-label="More levels">+</button>
              </div>
            </div>
          </div>
          <div class="setting">
            <span class="setting-label">Colors</span>
            <div class="setting-control">
              <div class="swatches"></div>
              <button type="button" class="gradient-fill-btn" hidden>Auto gradient</button>
            </div>
          </div>
          <div class="setting graded-only">
            <span class="setting-label">Schemes</span>
            <div class="setting-control">
              <select class="scheme-select"></select>
              <input type="text" class="scheme-name" placeholder="Scheme name" maxlength="24" />
              <button type="button" class="btn scheme-save">Save current</button>
              <button type="button" class="btn scheme-delete" hidden>Delete</button>
            </div>
          </div>
        </div>`;
      habitsEl.appendChild(card);

      const gridEl = card.querySelector(".grid");
      const daysEl = card.querySelector(".days");
      const monthsEl = card.querySelector(".months");
      const legendEl = card.querySelector(".legend");
      const hintEl = card.querySelector(".hint");

      function paintGrid() {
        gridEl.innerHTML = daysEl.innerHTML = monthsEl.innerHTML = "";
        const dayNames = { 1: "Mon", 3: "Wed", 5: "Fri" };
        for (let r = 0; r < 7; r++) {
          const lbl = document.createElement("div");
          lbl.className = "day-label"; lbl.textContent = dayNames[r] || "";
          daysEl.appendChild(lbl);
        }
        for (const week of WEEKS) for (const day of week) {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (!day.inYear) cell.style.visibility = "hidden";
          else {
            const key = isoDate(day.date);
            const v = entriesByDate[key] || 0;
            if (isFutureEmpty(day.date, v)) cell.style.visibility = "hidden";
            else {
              cell.style.background = colorFor(v, state.colors);
              cell.title = v ? `${key}: ${v}` : `${key}: no entry`;
              cell.dataset.date = key;
            }
          }
          gridEl.appendChild(cell);
        }
        monthsEl.style.gridTemplateColumns = `repeat(${WEEKS.length}, 12px)`;
        let lastMonth = -1;
        WEEKS.forEach((week, i) => {
          const firstInYear = week.find((d) => d.inYear);
          if (!firstInYear) return;
          const m = firstInYear.date.getMonth();
          if (m !== lastMonth) {
            lastMonth = m;
            const label = document.createElement("div");
            label.className = "month"; label.textContent = MONTHS[m];
            label.style.gridColumnStart = i + 1;
            monthsEl.appendChild(label);
          }
        });
      }

      function paintLegend() {
        legendEl.innerHTML = "";
        const mk = (c) => { const s = document.createElement("span"); s.className = "swatch"; s.style.background = c; return s; };
        const t = (x) => { const s = document.createElement("span"); s.textContent = x; return s; };
        const c = state.colors;
        if (c.scale.length === 1) legendEl.append(t("Not done"), mk(c.empty), mk(c.scale[0].color), t("Done"));
        else { legendEl.append(t("Less"), mk(c.empty)); c.scale.forEach((s) => legendEl.append(mk(s.color))); legendEl.append(t("More")); }
      }

      function paintHint() {
        const n = Object.keys(entriesByDate).length;
        hintEl.textContent = `${n} days logged · ` +
          (state.mode === "binary" ? "click a day to toggle" : "click a day to enter a value");
      }

      function repaint() { paintGrid(); paintLegend(); paintHint(); }

      // Write a single day for THIS habit
      async function logValue(key, value) {
        if (value > 0) {
          entriesByDate[key] = value;
          const { error } = await supabase.from("entries")
            .upsert({ habit_id: habit.id, date: key, value }, { onConflict: "habit_id,date" });
          if (error) console.error(error);
        } else {
          delete entriesByDate[key];
          const { error } = await supabase.from("entries")
            .delete().eq("habit_id", habit.id).eq("date", key);
          if (error) console.error(error);
        }
        repaint();
      }

      gridEl.addEventListener("click", async (e) => {
        const cell = e.target.closest(".cell");
        if (!cell || !cell.dataset.date) return;
        const key = cell.dataset.date;
        if (state.mode === "binary") {
          const cur = entriesByDate[key] || 0;
          await logValue(key, cur ? 0 : 1);
        } else {
          openEditor(cell, key, entriesByDate[key], (v) => logValue(key, v));
        }
      });

      // ---- Settings ----
      let saveTimer = null;
      async function saveHabit(patch) {
        Object.assign(habit, patch);
        const { error } = await supabase.from("habits").update(patch).eq("id", habit.id);
        if (error) console.error(error);
      }
      function saveColorsDebounced() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          state.colors.scale = normalizeScale(state.colors.scale);
          saveHabit({ colors: state.colors });
        }, 400);
      }

      function syncLevelCountInput() {
        const input = card.querySelector(".level-count");
        if (input) input.value = state.colors.scale.length;
      }

      function updateGradedControls() {
        const isBinary = state.mode === "binary";
        card.querySelectorAll(".graded-only").forEach((el) => { el.hidden = isBinary; });
        const gradBtn = card.querySelector(".gradient-fill-btn");
        if (gradBtn) {
          gradBtn.hidden = isBinary || state.colors.scale.length < 2;
          gradBtn.textContent = state.colors.scale.length === 2
            ? "Auto gradient (4 levels)"
            : "Auto gradient";
          gradBtn.title = "Blend colors evenly between the first and last swatch";
        }
      }

      function buildSwatches() {
        const wrap = card.querySelector(".swatches");
        wrap.innerHTML = "";
        const isBinary = state.mode === "binary";
        state.colors.scale.forEach((stop, i) => {
          const field = document.createElement("div"); field.className = "swatch-field";

          const colorInput = document.createElement("input");
          colorInput.type = "color"; colorInput.value = stop.color;
          colorInput.addEventListener("input", () => {
            state.colors.scale[i].color = colorInput.value;
            paintGrid(); paintLegend();
            saveColorsDebounced();
          });

          if (isBinary) {
            const label = document.createElement("span");
            label.textContent = "Done";
            field.append(colorInput, label);
          } else {
            const minInput = document.createElement("input");
            minInput.type = "number"; minInput.className = "min-val";
            minInput.min = "1"; minInput.step = "any"; minInput.value = stop.min;
            minInput.addEventListener("change", () => {
              state.colors.scale[i].min = Math.max(1, Number(minInput.value) || 1);
              state.colors.scale = normalizeScale(state.colors.scale);
              buildSwatches(); paintGrid(); paintLegend();
              saveColorsDebounced();
            });
            const minWrap = document.createElement("span");
            minWrap.className = "min-wrap"; minWrap.textContent = "≥";
            minWrap.title = "This color applies from this value upward";
            minWrap.appendChild(minInput);
            field.append(colorInput, minWrap);
          }
          wrap.appendChild(field);
        });
        syncLevelCountInput();
        updateGradedControls();
      }

      // init settings controls
      card.querySelector(`.mode[value=${state.mode}]`).checked = true;
      syncLevelCountInput();
      updateGradedControls();
      card.querySelector(".level-count").addEventListener("change", (e) => {
        const count = Math.max(1, Math.min(MAX_LEVELS, Number(e.target.value) || 1));
        e.target.value = count;
        state.colors.scale = resizeScale(state.colors.scale, count);
        buildSwatches(); paintGrid(); paintLegend();
        updateGradedControls();
        saveHabit({ colors: state.colors });
      });
      card.querySelectorAll(".step-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const input = card.querySelector(".level-count");
          const next = Math.max(1, Math.min(MAX_LEVELS, (Number(input.value) || 1) + Number(btn.dataset.step)));
          if (next === Number(input.value)) return;
          input.value = next;
          input.dispatchEvent(new Event("change"));
        });
      });
      card.querySelector(".gradient-fill-btn").addEventListener("click", () => {
        state.colors.scale = fillGradientScale(state.colors.scale);
        buildSwatches(); paintGrid(); paintLegend();
        updateGradedControls();
        saveHabit({ colors: state.colors });
      });

      // ---- Saved color schemes ----
      const schemeSelect = card.querySelector(".scheme-select");
      const schemeNameInput = card.querySelector(".scheme-name");
      const schemeDeleteBtn = card.querySelector(".scheme-delete");
      const presets = () => state.colors.presets || [];

      function syncSchemeUI() {
        schemeSelect.innerHTML = "";
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = presets().length ? "Switch scheme…" : "No saved schemes";
        schemeSelect.appendChild(placeholder);
        presets().forEach((p, i) => {
          const opt = document.createElement("option");
          opt.value = String(i); opt.textContent = p.name;
          schemeSelect.appendChild(opt);
        });
        schemeSelect.disabled = !presets().length;
        schemeDeleteBtn.hidden = true;
      }

      schemeSelect.addEventListener("change", () => {
        const preset = presets()[Number(schemeSelect.value)];
        if (!preset) { schemeDeleteBtn.hidden = true; return; }
        // Deep-copy so later color edits don't silently rewrite the saved scheme.
        state.colors.scale = normalizeScale(preset.scale.map((s) => ({ ...s })));
        buildSwatches(); paintGrid(); paintLegend();
        updateGradedControls();
        saveHabit({ colors: state.colors });
        schemeDeleteBtn.hidden = false;
      });

      card.querySelector(".scheme-save").addEventListener("click", () => {
        const name = schemeNameInput.value.trim() || `Scheme ${presets().length + 1}`;
        if (!state.colors.presets) state.colors.presets = [];
        state.colors.presets.push({ name, scale: state.colors.scale.map((s) => ({ ...s })) });
        schemeNameInput.value = "";
        syncSchemeUI();
        schemeSelect.value = String(presets().length - 1);
        schemeDeleteBtn.hidden = false;
        saveHabit({ colors: state.colors });
      });

      schemeDeleteBtn.addEventListener("click", () => {
        const i = Number(schemeSelect.value);
        if (!presets()[i]) return;
        state.colors.presets.splice(i, 1);
        syncSchemeUI();
        saveHabit({ colors: state.colors });
      });

      syncSchemeUI();
      card.querySelectorAll(".mode").forEach((radio) => {
        radio.addEventListener("change", () => {
          state.mode = radio.value;
          const keepPresets = state.colors.presets;
          if (radio.value === "binary") {
            // Stash the graded scale so switching back restores it.
            state.colors = {
              empty: state.colors.empty,
              scale: defaultColors("binary").scale,
              gradedScale: state.colors.gradedScale || state.colors.scale,
            };
          } else {
            const saved = state.colors.gradedScale;
            state.colors = {
              empty: state.colors.empty,
              scale: saved && saved.length ? normalizeScale(saved) : defaultColors("graded").scale,
            };
          }
          if (keepPresets && keepPresets.length) state.colors.presets = keepPresets;
          updateGradedControls();
          buildSwatches(); repaint();
          saveHabit({ mode: state.mode, colors: state.colors });
        });
      });
      card.querySelector(".settings-btn").addEventListener("click", (e) => {
        const s = card.querySelector(".settings");
        s.hidden = !s.hidden;
        e.currentTarget.classList.toggle("open", !s.hidden);
      });
      card.querySelector(".name").addEventListener("change", (e) => {
        saveHabit({ name: e.target.value.trim() || "Untitled" });
      });
      // Reordering only makes sense in the full view: a filtered embed sees a
      // subset, and renumbering just that subset would scramble the rest.
      card.querySelectorAll(".move-up, .move-down").forEach((btn) => { btn.hidden = WANTED.length > 0; });
      card.querySelector(".move-up").addEventListener("click", () => {
        const prev = card.previousElementSibling;
        if (prev) { animateReorder(() => habitsEl.insertBefore(card, prev)); persistOrder(); }
      });
      card.querySelector(".move-down").addEventListener("click", () => {
        const next = card.nextElementSibling;
        if (next) { animateReorder(() => habitsEl.insertBefore(next, card)); persistOrder(); }
      });
      // Two-step inline confirm: confirm() dialogs are blocked inside
      // sandboxed iframes (e.g. the Notion embed), so we can't use them.
      const deleteBtn = card.querySelector(".delete-btn");
      let confirmTimer = null;
      deleteBtn.addEventListener("click", async () => {
        if (!deleteBtn.classList.contains("confirm")) {
          deleteBtn.classList.add("confirm");
          deleteBtn.textContent = "Sure?";
          confirmTimer = setTimeout(() => {
            deleteBtn.classList.remove("confirm");
            deleteBtn.textContent = "Delete";
          }, 4000);
          return;
        }
        clearTimeout(confirmTimer);
        const { error } = await supabase.from("habits").delete().eq("id", habit.id);
        if (error) { console.error(error); return; }
        card.remove();
      });

      buildSwatches();
      repaint();
    }

    async function seedDemo(habitId) {
      const rows = []; const seen = {};
      for (let i = 0; i < 60; i++) {
        const day = new Date(YEAR, 0, 1);
        day.setDate(day.getDate() + Math.floor(Math.random() * 189));
        const key = isoDate(day);
        if (seen[key]) continue; seen[key] = true;
        rows.push({ habit_id: habitId, date: key, value: 1 + Math.floor(Math.random() * 4) });
      }
      await supabase.from("entries").upsert(rows, { onConflict: "habit_id,date" });
    }

    // FLIP animation: measure each card's position, apply the DOM change, then
    // slide every displaced card from its old spot to its new one.
    function animateReorder(applyChange) {
      const cards = [...habitsEl.children];
      cards.forEach((el) => el.getAnimations().forEach((a) => a.finish()));
      const before = new Map(cards.map((el) => [el, el.getBoundingClientRect().top]));
      applyChange();
      for (const el of cards) {
        const dy = before.get(el) - el.getBoundingClientRect().top;
        if (!dy) continue;
        el.animate(
          [{ transform: `translateY(${dy}px)` }, { transform: "translateY(0)" }],
          { duration: 250, easing: "ease-in-out" }
        );
      }
    }

    // Save every card's on-screen index as its position, so the order survives reloads.
    async function persistOrder() {
      const results = await Promise.all([...habitsEl.children].map((el, i) =>
        supabase.from("habits").update({ position: i }).eq("id", el.dataset.habitId)));
      for (const { error } of results) if (error) console.error(error);
    }

    document.getElementById("add-habit").addEventListener("click", async () => {
      const { data, error } = await supabase.from("habits")
        .insert({ name: "New habit", mode: "graded", colors: defaultColors("graded"),
                  position: habitsEl.children.length })
        .select().single();
      if (error) { console.error(error); return; }
      renderHabitCard(data, []);
      window.scrollTo(0, document.body.scrollHeight);
    });

    async function main() {
      try {
        let { data: habits, error } = await supabase.from("habits").select("*")
          .order("position").order("created_at");
        if (error) throw error;

        if (WANTED.length) {
          habits = habits.filter((h) => WANTED.includes(h.name.toLowerCase()));
        }

        if (habits.length === 0) {
          const { data, error: e2 } = await supabase.from("habits")
            .insert({ name: "My Habit", mode: "graded", colors: defaultColors("graded") })
            .select().single();
          if (e2) throw e2;
          habits = [data];
          if (DEMO) await seedDemo(data.id);
        }

        const { data: entries } = await supabase.from("entries").select("habit_id, date, value");
        const byHabit = {};
        for (const e of entries) (byHabit[e.habit_id] ||= []).push(e);

        habitsEl.innerHTML = "";
        for (const habit of habits) renderHabitCard(habit, byHabit[habit.id] || []);
        statusEl.textContent = `${habits.length} habit(s) · ${YEAR}`;
      } catch (err) {
        statusEl.hidden = false;
        statusEl.textContent = "Error: " + err.message;
        statusEl.className = "err";
        console.error(err);
      }
    }

    // ---- Auth ----
    // Password login works entirely inside a sandboxed iframe (Notion embed);
    // magic links don't, because they open in a new tab whose session the
    // embed's partitioned storage can't see.
    const authEl = document.getElementById("auth");
    const authMsg = document.getElementById("auth-msg");
    const logoutBtn = document.getElementById("logout");

    async function handleAuth(kind) {
      const email = document.getElementById("auth-email").value.trim();
      const password = document.getElementById("auth-password").value;
      if (!email || !password) { authMsg.textContent = "Enter an email and password."; return; }
      authMsg.textContent = "";
      const { data, error } = kind === "signup"
        ? await supabase.auth.signUp({ email, password })
        : await supabase.auth.signInWithPassword({ email, password });
      if (error) { authMsg.textContent = error.message; return; }
      if (!data.session) {
        authMsg.textContent = "Check your email to confirm your account, then log in.";
        return;
      }
      enterApp();
    }
    document.getElementById("login-btn").addEventListener("click", () => handleAuth("login"));
    document.getElementById("signup-btn").addEventListener("click", () => handleAuth("signup"));
    document.getElementById("auth-password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleAuth("login");
    });
    logoutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
      location.reload();
    });

    function enterApp() {
      authEl.hidden = true;
      logoutBtn.hidden = false;
      statusEl.hidden = WANTED.length > 0;
      main();
    }

    async function init() {
      if (WANTED.length) {
        // Filtered embed: just the heatmap, no page chrome.
        document.querySelector(".page-head").hidden = true;
      }
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        enterApp();
      } else {
        statusEl.hidden = true;
        authEl.hidden = false;
      }
    }
    init();
  </script>
</body>
</html>
