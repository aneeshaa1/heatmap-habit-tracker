<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Heatmap</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 24px;
      color: #1f2328;
      background: #fff;
    }
    h2 { margin: 0 0 4px; font-size: 16px; }
    #status { font-size: 12px; color: #57606a; margin-bottom: 16px; }
    #status.err { color: #cf222e; }

    /* ---- Calendar layout ---- */
    .cal { display: inline-block; }

    .months {
      display: grid;
      gap: 3px;
      margin-left: 30px;   /* clears the weekday labels on the left */
      margin-bottom: 4px;
      font-size: 11px;
      color: #57606a;
    }
    .month { grid-row: 1; white-space: nowrap; }

    .body { display: flex; gap: 3px; }

    .days {
      display: grid;
      grid-template-rows: repeat(7, 12px);
      gap: 3px;
      font-size: 11px;
      color: #57606a;
      width: 27px;
    }
    .day-label { line-height: 12px; }

    .grid {
      display: grid;
      grid-template-rows: repeat(7, 12px);
      grid-auto-flow: column;      /* fill column-by-column = week-by-week */
      grid-auto-columns: 12px;
      gap: 3px;
    }
    .cell {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: #ebedf0;
    }

    /* ---- Legend ---- */
    .legend {
      display: flex;
      align-items: center;
      gap: 4px;
      justify-content: flex-end;
      margin-top: 8px;
      font-size: 11px;
      color: #57606a;
    }
    .legend .cell { width: 12px; height: 12px; }
  </style>
</head>
<body>
  <h2 id="title">Habit Heatmap</h2>
  <div id="status">Loading…</div>

  <div class="cal">
    <div class="months" id="months"></div>
    <div class="body">
      <div class="days" id="days"></div>
      <div class="grid" id="grid"></div>
    </div>
    <div class="legend">
      <span>Less</span>
      <span class="cell" style="background:#ebedf0"></span>
      <span class="cell" style="background:#9be9a8"></span>
      <span class="cell" style="background:#40c463"></span>
      <span class="cell" style="background:#30a14e"></span>
      <span class="cell" style="background:#216e39"></span>
      <span>More</span>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // ---- Your project credentials -------------------------------------
    const SUPABASE_URL = "https://gcvdgragnbkcoxitomij.supabase.co";
    const SUPABASE_KEY = "sb_publishable_dbRHBbWuyeRyT_TmO4YPpQ_vONUyaGC";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    // -------------------------------------------------------------------

    const YEAR = 2026;
    const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    // GitHub's 5-step green scale (index 0 = empty)
    const LEVEL_COLORS = ["#ebedf0", "#9be9a8", "#40c463", "#30a14e", "#216e39"];

    // Set DEMO to false once you want to start with a clean, empty year.
    const DEMO = true;

    const statusEl = document.getElementById("status");

    // Format a Date as "YYYY-MM-DD" in LOCAL time (avoids timezone off-by-one).
    function isoDate(d) {
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${d.getFullYear()}-${m}-${day}`;
    }

    // Turn a numeric value into a color-scale level 0–4.
    function valueToLevel(v) {
      if (!v) return 0;
      return Math.min(4, Math.ceil(v));
    }

    // Build an array of weeks (columns), each 7 days (rows Sun→Sat).
    function buildWeeks(year) {
      const first = new Date(year, 0, 1);
      const last = new Date(year, 11, 31);
      const start = new Date(first);
      start.setDate(start.getDate() - start.getDay()); // back up to Sunday

      const weeks = [];
      const cur = new Date(start);
      while (cur <= last) {
        const week = [];
        for (let d = 0; d < 7; d++) {
          const date = new Date(cur);
          week.push({ date, inYear: date >= first && date <= last });
          cur.setDate(cur.getDate() + 1);
        }
        weeks.push(week);
      }
      return weeks;
    }

    function render(weeks, entriesByDate) {
      const gridEl = document.getElementById("grid");
      const daysEl = document.getElementById("days");
      const monthsEl = document.getElementById("months");
      gridEl.innerHTML = daysEl.innerHTML = monthsEl.innerHTML = "";

      // Weekday labels (only Mon/Wed/Fri, like GitHub)
      const dayNames = { 1: "Mon", 3: "Wed", 5: "Fri" };
      for (let r = 0; r < 7; r++) {
        const lbl = document.createElement("div");
        lbl.className = "day-label";
        lbl.textContent = dayNames[r] || "";
        daysEl.appendChild(lbl);
      }

      // Squares: append column-by-column so CSS grid lays out weeks left→right
      for (const week of weeks) {
        for (const day of week) {
          const cell = document.createElement("div");
          cell.className = "cell";
          if (!day.inYear) {
            cell.style.visibility = "hidden";
          } else {
            const key = isoDate(day.date);
            const v = entriesByDate[key] || 0;
            cell.style.background = LEVEL_COLORS[valueToLevel(v)];
            cell.title = v ? `${key}: ${v}` : `${key}: no entry`;
            cell.dataset.date = key;
          }
          gridEl.appendChild(cell);
        }
      }

      // Month labels, positioned above the column where each month begins
      monthsEl.style.gridTemplateColumns = `repeat(${weeks.length}, 12px)`;
      let lastMonth = -1;
      weeks.forEach((week, i) => {
        const firstInYear = week.find((d) => d.inYear);
        if (!firstInYear) return;
        const m = firstInYear.date.getMonth();
        if (m !== lastMonth) {
          lastMonth = m;
          const label = document.createElement("div");
          label.className = "month";
          label.textContent = MONTHS[m];
          label.style.gridColumnStart = i + 1;
          monthsEl.appendChild(label);
        }
      });
    }

    // Insert ~60 random days of sample data so the grid visibly works.
    async function seedDemo(habitId) {
      const rows = [];
      const seen = {};
      for (let i = 0; i < 60; i++) {
        const day = new Date(YEAR, 0, 1);
        day.setDate(day.getDate() + Math.floor(Math.random() * 189)); // Jan–Jun
        const key = isoDate(day);
        if (seen[key]) continue;
        seen[key] = true;
        rows.push({ habit_id: habitId, date: key, value: 1 + Math.floor(Math.random() * 4) });
      }
      await supabase.from("entries").upsert(rows, { onConflict: "habit_id,date" });
    }

    async function main() {
      try {
        // Get the first habit, or create one if none exist yet
        let { data: habits, error } = await supabase
          .from("habits").select("*").order("created_at");
        if (error) throw error;

        let habit = habits[0];
        if (!habit) {
          const { data, error: e2 } = await supabase
            .from("habits").insert({ name: "My Habit", mode: "graded" }).select().single();
          if (e2) throw e2;
          habit = data;
        }
        document.getElementById("title").textContent = habit.name;

        // Load this habit's entries
        let { data: entries } = await supabase
          .from("entries").select("date, value").eq("habit_id", habit.id);

        if (DEMO && entries.length === 0) {
          await seedDemo(habit.id);
          ({ data: entries } = await supabase
            .from("entries").select("date, value").eq("habit_id", habit.id));
        }

        const entriesByDate = {};
        for (const e of entries) entriesByDate[e.date] = Number(e.value);

        render(buildWeeks(YEAR), entriesByDate);
        statusEl.textContent = `${YEAR} · ${entries.length} days logged`;
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        statusEl.className = "err";
        console.error(err);
      }
    }

    main();
  </script>
</body>
</html>
