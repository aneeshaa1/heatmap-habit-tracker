<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Heatmap</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 24px;
      color: #1f2328;
      background: #fff;
    }
    #status {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      border: 1px solid #d0d7de;
      background: #f6f8fa;
    }
    #status.ok  { border-color: #2da44e; background: #dafbe1; }
    #status.err { border-color: #cf222e; background: #ffebe9; }
    pre {
      font-size: 12px;
      background: #f6f8fa;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h2>Habit Heatmap — connection test</h2>
  <div id="status">Connecting…</div>
  <pre id="output"></pre>

  <!-- Supabase JS client, loaded from CDN (no build step needed) -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // ---- Your project credentials -------------------------------------
    const SUPABASE_URL = "https://gcvdgragnbkcoxitomij.supabase.co";
    const SUPABASE_KEY = "sb_publishable_dbRHBbWuyeRyT_TmO4YPpQ_vONUyaGC";
    // -------------------------------------------------------------------

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");

    async function testConnection() {
      try {
        // 1. Write: insert a test habit (safe to delete later)
        const { error: insertError } = await supabase
          .from("habits")
          .insert({ name: "Test habit", mode: "binary" });
        if (insertError) throw insertError;

        // 2. Read: fetch all habits back
        const { data, error: readError } = await supabase
          .from("habits")
          .select("*");
        if (readError) throw readError;

        statusEl.textContent = `Connected! Read/write works. Found ${data.length} habit(s).`;
        statusEl.className = "ok";
        outputEl.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
        statusEl.className = "err";
        outputEl.textContent = JSON.stringify(err, null, 2);
      }
    }

    testConnection();
  </script>
</body>
</html>
